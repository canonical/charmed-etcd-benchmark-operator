name: Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  workflow_call:

jobs:
  lint:
    name: Lint
    uses: canonical/data-platform-workflows/.github/workflows/lint.yaml@v32.1.0

  unit-test:
    name: Unit test charm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install tox & uv
        run: |
          pipx install tox
          pipx install uv
      - name: Run tests
        run: tox run -e unit
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4

  lib-check:
    name: Check libraries
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: |
          # Workaround for https://github.com/canonical/charmcraft/issues/1389#issuecomment-1880921728
          touch requirements.txt
      - name: Check libs
        uses: canonical/charming-actions/check-libraries@2.7.0
        continue-on-error: true
        with:
          credentials: ${{ secrets.CHARMHUB_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          use-labels: false
          fail-build: ${{ github.event_name == 'pull_request' }}

  build:
    name: Build charm
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v32.1.0
    with:
      path-to-charm-directory: .

  integration-test:
    name: Integration test charm
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-test
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup lxd controller
        if: ${{ 'lxd' == matrix.tests.provider }}
        uses: charmed-kubernetes/actions-operator@main
        with:
          provider: lxd
          juju-channel: ${{ matrix.juju-version.juju-snap-channel }}
          charmcraft-channel: "2.x/stable"
      - name: Download packed charm(s)
        timeout-minutes: 5
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.build.outputs.artifact-prefix }}-*
          merge-multiple: true
      - name: Run integration tests
        run:
          tox run -e integration
      - name: Print debug-log
        if: failure()
        run: juju switch testing; juju debug-log --replay --no-tail
      - name: Dump logs
        uses: canonical/charm-logdump-action@main
        if: failure()
        with:
          app: charmed-etcd-benchmark-operator
          model: testing